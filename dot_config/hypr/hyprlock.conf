# hyprlock — Wayland screen locker for the uwsm-managed sway session.
#
# Invoked by swayidle (30-min idle + before-sleep) and on demand. hyprlock talks to
# fprintd over D-Bus in a parallel thread, so fingerprint and password auth run
# concurrently at the lock screen (the thing X11 lockers structurally cannot do).
#
# Recovery: the password field (PAM) is the always-available fallback. Fingerprint is
# additive — if the reader misbehaves, set `fingerprint.enabled = false` and password
# unlock still works (or switch the locker back to swaylock).

$font = Inconsolata Nerd Font

# General locker behavior.
general {
    hide_cursor        = true   # hide the mouse cursor while locked
    ignore_empty_input = true   # Enter on an empty field does nothing (no fail penalty)
}

# Authentication backends.
auth {
    # PAM is the primary/fallback path — the password field authenticates via the
    # `hyprlock` PAM service (/etc/pam.d/hyprlock). Always kept enabled for recovery.
    pam {
        enabled = true
        module  = hyprlock
    }

    # Fingerprint via libfprint/fprintd over D-Bus. Runs in parallel with the password
    # field, so a swipe OR a typed password unlocks. Requires enrolled prints (fprintd-enroll).
    fingerprint {
        enabled         = true
        ready_message   = Scan fingerprint or type password
        present_message = Scanning fingerprint...
        retry_delay     = 250   # ms between retries on a no-match (max 3 before disabled)
    }
}

# Background: solid black (matches the sway `output * bg #000000` baseline; no
# screenshot/blur to keep the locked screen contents-free and minimal).
background {
    monitor =
    color   = rgba(0, 0, 0, 1.0)
}

# Password input field, centered.
input-field {
    monitor           =
    size              = 320, 50
    outline_thickness = 2
    dots_size         = 0.3
    dots_spacing      = 0.25
    dots_center       = true
    inner_color       = rgba(40, 40, 40, 1.0)     # field background
    outer_color       = rgba(168, 153, 132, 1.0)  # idle outline
    font_color        = rgba(235, 219, 178, 1.0)  # typed/dot color
    check_color       = rgba(184, 187, 38, 1.0)   # while authenticating
    fail_color        = rgba(204, 36, 29, 1.0)    # on failed attempt
    placeholder_text  = <i>Locked</i>
    fail_text         = <i>$FAIL ($ATTEMPTS)</i>
    rounding          = 6
    position          = 0, -20
    halign            = center
    valign            = center
}
