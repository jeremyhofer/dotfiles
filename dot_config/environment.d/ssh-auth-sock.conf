# Route SSH_AUTH_SOCK at the openssh-shipped systemd-user ssh-agent.socket
# (/usr/lib/systemd/user/ssh-agent.socket → %t/ssh-agent.socket).
#
# Read by `systemd --user`, so this covers systemd-user units and
# dbus-activated apps. The TTY-login → WM → dex chain does NOT read
# environment.d, so ~/.zprofile exports the same value for that path.
# Both hold the identical generic value, so there is no drift.
SSH_AUTH_SOCK=${XDG_RUNTIME_DIR}/ssh-agent.socket

# Never invoke a GUI askpass: a keyless SSH op fails clean rather than popping a
# stuck askpass dialog. Keys are served by the agent.
SSH_ASKPASS_REQUIRE=never
