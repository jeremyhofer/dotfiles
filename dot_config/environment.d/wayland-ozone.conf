# systemd/uwsm user environment (environment.d): KEY=VALUE, read into the
# graphical-session activation environment so it reaches every app + the bar.
#
# Prefer native Wayland (Ozone) for Electron/Chromium-based apps so they don't launch
# on XWayland, which renders blurry on fractional-scaled HiDPI outputs (no per-app
# XWayland scaling on wlroots). "auto" picks Wayland in a Wayland session and X11
# otherwise, so it stays correct under the i3/X11 break-glass session too.
ELECTRON_OZONE_PLATFORM_HINT=auto
