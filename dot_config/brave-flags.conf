# Brave/Chromium launch flags — sourced by /usr/bin/brave, which reads
# $XDG_CONFIG_HOME/brave-flags.conf (one flag per line; lines starting with # or
# blank are ignored; each non-comment line becomes exactly one argument).
#
# --- HiDPI crispness on fractional-scaled Wayland outputs ---
# On a ~200-DPI panel run at a fractional compositor scale (e.g. 1.25), Chromium's
# native Wayland fractional-scale rendering leaves text and UI chrome slightly soft:
# its GPU raster path introduces sub-pixel jitter at non-integer scales, worst around
# 100-125%. (Upstream bug: https://issues.chromium.org/issues/40934705)
#
# Disabling the fractional-scale protocol makes Brave render a crisp integer 2x buffer
# and lets the compositor supersample it down to the fractional scale — the same crisp
# path the rest of the desktop already uses. It is a NO-OP on integer-scale outputs
# (1.0x / 2.0x), so it is multi-monitor safe, and it is harmless under an X11 session.
# Cost: minor extra GPU/memory from 2x overdraw — negligible on modern hardware.
#
# Keep ALL disabled features on THIS ONE line, comma-separated. A second
# --disable-features line would silently override (not merge with) this one.
--disable-features=WaylandFractionalScaleV1
